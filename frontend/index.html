<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capsule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/lib/xterm.min.css" />
<style>
/* ── Reset & base ───────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #141a13;
  --bg-panel:    #1a2419;
  --bg-inset:    #0f1410;
  --grid:        #1f2b1d;
  --border:      #2d4029;
  --border-hi:   #3d5838;

  --phosphor:    #4ade80;
  --phosphor-lo: #4ade8030;
  --phosphor-md: #4ade8077;
  --phosphor-hi: #86efac;

  --amber:       #f59e0b;
  --amber-lo:    #f59e0b30;
  --red:         #f87171;
  --red-lo:      #f8717130;

  --text:        #c8e6cc;
  --text-lo:     #6b8f70;
  --text-hi:     #e8f5e9;

  --font: 'JetBrains Mono', 'Fira Code', monospace;
  --radius: 2px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── Grid texture ────────────────────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 32px 32px;
  background-position: -0.5px -0.5px;
  opacity: 1;
}

/* Scanline overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 999;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
}

/* ── Layout ─────────────────────────────────────────────────────────────── */
#app {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-rows: 40px 1fr 28px;
  height: 100vh;
  padding: 10px;
  gap: 6px;
  overflow: hidden;
}

/* ── Top bar ────────────────────────────────────────────────────────────── */
#topbar {
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0 12px;
  overflow: hidden;
  min-height: 0;
}

#wordmark {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-right: 16px;
  border-right: 1px solid var(--border);
  margin-right: 16px;
  flex-shrink: 0;
}

#wordmark .logo-icon {
  width: 18px;
  height: 18px;
  position: relative;
  flex-shrink: 0;
}

#wordmark .logo-icon svg {
  width: 100%;
  height: 100%;
}

#wordmark .name {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-hi);
}

.bar-segment {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 14px;
  border-right: 1px solid var(--border);
  font-size: 10px;
  letter-spacing: 0.05em;
  color: var(--text-lo);
  white-space: nowrap;
  height: 100%;
}

.bar-segment:last-child {
  border-right: none;
}

.bar-label {
  text-transform: uppercase;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--text-lo);
  opacity: 0.6;
}

.bar-value {
  color: var(--text);
}

.bar-spacer {
  flex: 1;
}

/* Connection status indicator */
#conn-status {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 0 14px;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--text-lo);
  margin-left: auto;
}

#conn-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--text-lo);
  flex-shrink: 0;
  transition: background 0.4s, box-shadow 0.4s;
}

#conn-dot.connecting {
  background: var(--amber);
  animation: pulse-amber 1s ease-in-out infinite;
}

#conn-dot.connected {
  background: var(--phosphor);
  box-shadow: 0 0 0 2px var(--phosphor-lo), 0 0 8px var(--phosphor);
  animation: pulse-green 2.4s ease-in-out infinite;
}

#conn-dot.error {
  background: var(--red);
  box-shadow: 0 0 6px var(--red);
}

#conn-label {
  text-transform: uppercase;
  font-size: 9px;
  letter-spacing: 0.12em;
}

#conn-label.connected { color: var(--phosphor); }
#conn-label.connecting { color: var(--amber); }
#conn-label.error { color: var(--red); }
#conn-label.disconnected { color: var(--text-lo); }

@keyframes pulse-green {
  0%, 100% { box-shadow: 0 0 0 2px var(--phosphor-lo), 0 0 6px var(--phosphor); }
  50%       { box-shadow: 0 0 0 4px var(--phosphor-lo), 0 0 14px var(--phosphor); }
}

@keyframes pulse-amber {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}

/* ── Terminal frame ─────────────────────────────────────────────────────── */
#frame {
  position: relative;
  display: flex;
  flex-direction: column;
  background: var(--bg-inset);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  min-height: 0;
  transition: border-color 0.6s, box-shadow 0.6s;
}

#frame.connected {
  border-color: var(--border-hi);
  box-shadow:
    0 0 0 1px var(--phosphor-lo),
    inset 0 0 40px rgba(0,0,0,0.4);
}

#frame.error {
  border-color: #3d1f1f;
  box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
}

/* Reticle corner ticks */
#frame::before,
#frame::after,
#frame-corner-bl,
#frame-corner-br {
  content: '';
  position: absolute;
  z-index: 10;
  pointer-events: none;
  width: 12px;
  height: 12px;
}

#frame::before {
  top: 0; left: 0;
  border-top: 1px solid var(--phosphor-md);
  border-left: 1px solid var(--phosphor-md);
}

#frame::after {
  top: 0; right: 0;
  border-top: 1px solid var(--phosphor-md);
  border-right: 1px solid var(--phosphor-md);
}

#frame-corner-bl {
  bottom: 0; left: 0;
  border-bottom: 1px solid var(--phosphor-md);
  border-left: 1px solid var(--phosphor-md);
}

#frame-corner-br {
  bottom: 0; right: 0;
  border-bottom: 1px solid var(--phosphor-md);
  border-right: 1px solid var(--phosphor-md);
}

#frame.disconnected::before,
#frame.disconnected::after,
#frame.disconnected ~ * .frame-corner,
#frame.error::before,
#frame.error::after {
  border-color: var(--text-lo);
  opacity: 0.3;
}

/* Specimen label strip */
#specimen-label {
  position: absolute;
  top: 10px;
  right: 14px;
  z-index: 10;
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--phosphor-md);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s;
}

#frame.connected #specimen-label {
  opacity: 1;
}

/* Terminal wrapper */
#terminal-container {
  flex: 1;
  min-height: 0;
  padding: 4px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

#terminal-container .xterm {
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

#terminal-container .xterm-screen {
  min-height: 0;
}

/* Force xterm to fill its container */
.xterm {
  height: 100%;
}

.xterm-screen {
  height: 100% !important;
}

.xterm-viewport {
  border-radius: 0 !important;
  overflow-y: hidden !important;
}

/* ── Overlay states ─────────────────────────────────────────────────────── */
#overlay {
  position: absolute;
  inset: 0;
  z-index: 20;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: var(--bg-inset);
  transition: opacity 0.4s;
}

#overlay.hidden {
  opacity: 0;
  pointer-events: none;
}

.overlay-icon {
  width: 48px;
  height: 48px;
  opacity: 0.3;
}

.overlay-title {
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text);
}

.overlay-sub {
  font-size: 10px;
  color: var(--text-lo);
  letter-spacing: 0.08em;
}

.spinner {
  width: 24px;
  height: 24px;
  border: 1px solid var(--border-hi);
  border-top-color: var(--phosphor);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ── Bottom bar ─────────────────────────────────────────────────────────── */
#bottombar {
  display: flex;
  align-items: center;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0 12px;
  gap: 0;
  overflow: hidden;
}

.bottom-segment {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 0 12px;
  border-right: 1px solid var(--border);
  font-size: 10px;
  height: 100%;
  color: var(--text-lo);
}

.bottom-segment:first-child {
  padding-left: 0;
}

.bottom-segment:last-child {
  border-right: none;
}

.bottom-segment .icon {
  font-size: 9px;
  opacity: 0.5;
}

#log-area {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding: 0 12px;
  font-size: 10px;
  color: var(--text-lo);
  letter-spacing: 0.03em;
}

#log-area .log-entry {
  animation: log-fade 0.3s ease-out;
}

@keyframes log-fade {
  from { opacity: 0; transform: translateY(2px); }
  to   { opacity: 1; transform: translateY(0); }
}

#uptime {
  font-variant-numeric: tabular-nums;
  color: var(--text-lo);
  opacity: 0.5;
  transition: color 0.5s;
}

#uptime.active {
  color: var(--phosphor);
  opacity: 0.7;
}

/* ── Error banner ───────────────────────────────────────────────────────── */
#error-banner {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 30;
  background: var(--red-lo);
  border-bottom: 1px solid var(--red);
  color: var(--red);
  padding: 6px 14px;
  font-size: 10px;
  letter-spacing: 0.06em;
  display: none;
  align-items: center;
  gap: 8px;
}

#error-banner.visible {
  display: flex;
}
</style>
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <div id="topbar">
    <div id="wordmark">
      <div class="logo-icon">
        <!-- Capsule pill icon -->
        <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="5" width="16" height="8" rx="4" stroke="#4ade80" stroke-width="1" fill="none" opacity="0.8"/>
          <line x1="9" y1="5" x2="9" y2="13" stroke="#4ade80" stroke-width="1" opacity="0.5"/>
          <rect x="1" y="5" width="8" height="8" rx="4" rx="4" fill="#4ade8018"/>
        </svg>
      </div>
      <span class="name">Capsule</span>
    </div>

    <div class="bar-segment">
      <span class="bar-label">session</span>
      <span class="bar-value" id="bar-session">—</span>
    </div>

    <div class="bar-segment">
      <span class="bar-label">container</span>
      <span class="bar-value" id="bar-container">—</span>
    </div>

    <div class="bar-segment">
      <span class="bar-label">size</span>
      <span class="bar-value" id="bar-size">—</span>
    </div>

    <div class="bar-spacer"></div>

    <div id="conn-status">
      <div id="conn-dot"></div>
      <span id="conn-label" class="disconnected">offline</span>
    </div>
  </div>

  <!-- Terminal frame -->
  <div id="frame" class="disconnected">
    <!-- Reticle corners (bottom two need DOM elements, top two are ::before/::after) -->
    <div id="frame-corner-bl"></div>
    <div id="frame-corner-br"></div>

    <div id="specimen-label">SPECIMEN · LIVE</div>

    <!-- xterm goes here -->
    <div id="terminal-container"></div>

    <!-- State overlay -->
    <div id="overlay">
      <div class="spinner" id="overlay-spinner"></div>
      <div class="overlay-title" id="overlay-title">Initialising</div>
      <div class="overlay-sub" id="overlay-sub">connecting to runtime…</div>
    </div>

    <!-- Error banner inside frame -->
    <div id="error-banner">
      <span>⚠</span>
      <span id="error-text"></span>
    </div>
  </div>

  <!-- Bottom bar -->
  <div id="bottombar">
    <div class="bottom-segment">
      <span class="icon">◎</span>
      <span id="uptime">00:00:00</span>
    </div>
    <div class="bottom-segment">
      <span class="icon">⬡</span>
      <span id="bar-runtime">runtime:3001</span>
    </div>
    <div id="log-area">
      <span id="log-text">—</span>
    </div>
    <div class="bottom-segment">
      <span id="bar-encoding">UTF-8</span>
    </div>
    <div class="bottom-segment" style="border-right:none">
      <span id="bar-shell">bash</span>
    </div>
  </div>

</div>

<script src="/lib/xterm.min.js"></script>
<script src="/lib/xterm-addon-fit.min.js"></script>
<script>
(function () {
  'use strict';

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const frame         = document.getElementById('frame');
  const overlay       = document.getElementById('overlay');
  const overlayTitle  = document.getElementById('overlay-title');
  const overlaySub    = document.getElementById('overlay-sub');
  const overlaySpinner= document.getElementById('overlay-spinner');
  const connDot       = document.getElementById('conn-dot');
  const connLabel     = document.getElementById('conn-label');
  const errorBanner   = document.getElementById('error-banner');
  const errorText     = document.getElementById('error-text');
  const logText       = document.getElementById('log-text');
  const barSession    = document.getElementById('bar-session');
  const barContainer  = document.getElementById('bar-container');
  const barSize       = document.getElementById('bar-size');
  const uptime        = document.getElementById('uptime');

  // ── Terminal ──────────────────────────────────────────────────────────────
  const term = new Terminal({
    cursorBlink:   true,
    cursorStyle:   'block',
    fontSize:      13,
    fontFamily:    '"JetBrains Mono", "Fira Code", monospace',
    fontWeight:    '400',
    lineHeight:    1.2,
    letterSpacing: 0,
    scrollback:    10000,
    allowTransparency: true,
    theme: {
      background:          '#0f1410',
      foreground:          '#c8e6cc',
      cursor:              '#4ade80',
      cursorAccent:        '#0f1410',
      selectionBackground: '#4ade8040',
      black:               '#1f2b1d',
      red:                 '#f87171',
      green:               '#4ade80',
      yellow:              '#f59e0b',
      blue:                '#60a5fa',
      magenta:             '#c084fc',
      cyan:                '#34d399',
      white:               '#c8e6cc',
      brightBlack:         '#3d5838',
      brightRed:           '#fca5a5',
      brightGreen:         '#86efac',
      brightYellow:        '#fcd34d',
      brightBlue:          '#93c5fd',
      brightMagenta:       '#d8b4fe',
      brightCyan:          '#6ee7b7',
      brightWhite:         '#e8f5e9',
    }
  });

  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById('terminal-container'));

  // ── State ─────────────────────────────────────────────────────────────────
  let ws            = null;
  let sessionId     = null;
  let connectedAt   = null;
  let uptimeTimer   = null;
  let resizeTimer   = null;
  let reconnectTimer = null;
  let reconnectAttempts = 0;
  const MAX_RECONNECT = 5;
  const decoder     = new TextDecoder();

  // ── Logging ───────────────────────────────────────────────────────────────
  function log(msg) {
    console.log('[capsule]', msg);
    logText.textContent = msg;
    logText.classList.remove('log-entry');
    void logText.offsetWidth; // reflow to retrigger animation
    logText.classList.add('log-entry');
  }

  // ── Connection state UI ───────────────────────────────────────────────────
  function setConnState(state, label) {
    connDot.className = state;
    connLabel.className = state;
    connLabel.textContent = label;
    frame.className = state;
  }

  function showOverlay(title, sub, spinner = true) {
    overlayTitle.textContent = title;
    overlaySub.textContent   = sub;
    overlaySpinner.style.display = spinner ? 'block' : 'none';
    overlay.classList.remove('hidden');
  }

  function hideOverlay() {
    overlay.classList.add('hidden');
  }

  function showError(msg) {
    errorText.textContent = msg;
    errorBanner.classList.add('visible');
    setTimeout(() => errorBanner.classList.remove('visible'), 6000);
  }

  // ── Uptime counter ────────────────────────────────────────────────────────
  function startUptime() {
    connectedAt = Date.now();
    uptime.classList.add('active');
    uptimeTimer = setInterval(() => {
      const s = Math.floor((Date.now() - connectedAt) / 1000);
      const h = String(Math.floor(s / 3600)).padStart(2, '0');
      const m = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
      const sec = String(s % 60).padStart(2, '0');
      uptime.textContent = `${h}:${m}:${sec}`;
    }, 1000);
  }

  function stopUptime() {
    clearInterval(uptimeTimer);
    uptimeTimer = null;
    uptime.classList.remove('active');
    uptime.textContent = '00:00:00';
  }

  // ── Size display ──────────────────────────────────────────────────────────
  function updateSizeDisplay() {
    barSize.textContent = `${term.cols}×${term.rows}`;
  }

  // ── WebSocket ─────────────────────────────────────────────────────────────
  function sendJson(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(obj));
    }
  }

  function connect() {
    clearTimeout(reconnectTimer);

    const wsUrl = 'ws://' + window.location.hostname + ':3001/ws';
    setConnState('connecting', 'connecting');
    showOverlay('Establishing Connection', `${wsUrl}`, true);
    log('connecting → ' + wsUrl);

    ws = new WebSocket(wsUrl);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      log('socket open — sending initial size');
      // Send initial resize so runtime creates session with correct dimensions
      fitAddon.fit();
      sendJson({ type: 'resize', cols: term.cols, rows: term.rows });
      updateSizeDisplay();
    };

    ws.onmessage = (e) => {
      if (e.data instanceof ArrayBuffer) {
        term.write(decoder.decode(e.data));
        return;
      }
      const msg = JSON.parse(e.data);
      if (msg.type === 'connected') {
        onConnected(msg.session_id);
      } else if (msg.type === 'error') {
        log('error: ' + msg.message);
        showError(msg.message);
        setConnState('error', 'error');
      }
    };

    ws.onerror = () => {
      log('socket error');
    };

    ws.onclose = (e) => {
      log(`disconnected (${e.code})`);
      onDisconnected(e.code);
    };
  }

  function onConnected(sid) {
    sessionId = sid;
    reconnectAttempts = 0;

    barSession.textContent   = sid.slice(0, 8) + '…';
    barContainer.textContent = 'docker';

    setConnState('connected', 'connected');
    hideOverlay();
    startUptime();
    term.focus();
    log(`session ${sid.slice(0, 8)} active`);
  }

  function onDisconnected(code) {
    stopUptime();
    sessionId = null;
    barSession.textContent   = '—';
    barContainer.textContent = '—';
    setConnState('disconnected', 'offline');

    if (code === 1000 || code === 1001) {
      // Clean close — show idle state
      showOverlay('Session Ended', 'container released', false);
      return;
    }

    reconnectAttempts++;
    if (reconnectAttempts > MAX_RECONNECT) {
      showOverlay('Connection Lost', 'max retries reached — reload to reconnect', false);
      setConnState('error', 'offline');
      return;
    }

    const delay = Math.min(1000 * Math.pow(1.5, reconnectAttempts - 1), 10000);
    showOverlay(
      'Reconnecting',
      `attempt ${reconnectAttempts}/${MAX_RECONNECT} in ${(delay / 1000).toFixed(1)}s…`,
      true
    );
    log(`reconnecting in ${(delay / 1000).toFixed(1)}s (attempt ${reconnectAttempts})`);
    reconnectTimer = setTimeout(connect, delay);
  }

  // ── Terminal input ────────────────────────────────────────────────────────
  term.onData((data) => {
    sendJson({ type: 'terminal_input', data });
  });

  term.onResize(({ cols, rows }) => {
    sendJson({ type: 'resize', cols, rows });
    updateSizeDisplay();
    log(`resize → ${cols}×${rows}`);
  });

  // ── Window resize ─────────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => fitAddon.fit(), 80);
  });

  // ── Boot ──────────────────────────────────────────────────────────────────
  if (typeof Terminal === 'undefined' || typeof FitAddon === 'undefined') {
    showOverlay('Failed to Load', 'terminal libraries missing', false);
    setConnState('error', 'error');
    return;
  }

  // Fit after a tick so layout is complete
  setTimeout(() => {
    fitAddon.fit();
    updateSizeDisplay();
    connect();
  }, 60);

})();
</script>
</body>
</html>
