<!DOCTYPE html>
<html>
<head>
    <title>Capsule Terminal</title>
    <link rel="stylesheet" href="/lib/xterm.min.css" />
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #0d1117;
            font-family: system-ui, -apple-system, sans-serif;
        }
        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 12px;
        }
        #header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        h1 { color: #c9d1d9; font-size: 18px; margin: 0; }
        #status {
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 4px;
            background: #21262d;
            color: #8b949e;
        }
        #status.connected { background: #238636; color: #fff; }
        #status.reconnecting { background: #9e6a03; color: #fff; }
        #status.error { background: #da3633; color: #fff; }
        #export-btn {
            margin-left: auto;
            padding: 6px 12px;
            background: #238636;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        #export-btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
        #export-btn:hover:not(:disabled) { background: #2ea043; }
        #terminal-container {
            flex: 1;
            min-height: 0;
            border: 1px solid #30363d;
            border-radius: 6px;
            overflow: hidden;
        }
        #debug {
            flex-shrink: 0;
            color: #484f58;
            font-size: 11px;
            font-family: monospace;
            margin-top: 8px;
            max-height: 60px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="header">
            <h1>Capsule</h1>
            <div id="status">Loading...</div>
            <button id="export-btn" disabled>Export Workspace</button>
        </div>
        <div id="terminal-container"></div>
        <div id="debug"></div>
    </div>

    <script src="/lib/xterm.min.js"></script>
    <script src="/lib/xterm-addon-fit.min.js"></script>
    <script>
    (function() {
        const $ = id => document.getElementById(id);
        const statusEl = $('status');
        const debugEl = $('debug');
        const container = $('terminal-container');
        const exportBtn = $('export-btn');

        const SESSION_KEY = 'capsule_session_id';
        const RECONNECT_DELAY = 2000;
        const MAX_RECONNECT_ATTEMPTS = 5;
        const HEARTBEAT_INTERVAL = 30000; // 30 seconds

        let reconnectAttempts = 0;
        let sessionId = sessionStorage.getItem(SESSION_KEY);
        
        log('init sessionId: ' + (sessionId ? sessionId.slice(0,8) : 'null'));

        function log(msg) {
            console.log('[capsule]', msg);
            debugEl.textContent += msg + '\n';
            debugEl.scrollTop = debugEl.scrollHeight;
        }

        function setStatus(text, state) {
            statusEl.textContent = text;
            statusEl.className = state || '';
        }

        if (typeof Terminal === 'undefined' || typeof FitAddon === 'undefined') {
            setStatus('Failed to load terminal libraries', 'error');
            return;
        }

        log('libs loaded');

        const term = new Terminal({
            cursorBlink: true,
            cursorStyle: 'block',
            fontSize: 14,
            fontFamily: '"JetBrains Mono", Menlo, Monaco, "Courier New", monospace',
            lineHeight: 1.1,
            scrollback: 10000,
            theme: {
                background: '#0d1117',
                foreground: '#c9d1d9',
                cursor: '#58a6ff',
                selectionBackground: '#264f78',
                black: '#484f58',
                red: '#ff7b72',
                green: '#7ee787',
                yellow: '#d29922',
                blue: '#79c0ff',
                magenta: '#d2a8ff',
                cyan: '#a5d6ff',
                white: '#c9d1d9',
            }
        });

        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(container);

        setTimeout(() => {
            fitAddon.fit();
            log('size: ' + term.cols + 'x' + term.rows);
            connect();
        }, 50);

        let resizeTimeout = null;
        window.addEventListener('resize', () => {
            if (resizeTimeout) clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                fitAddon.fit();
                log('resized: ' + term.cols + 'x' + term.rows);
            }, 100);
        });

        let ws = null;
        let heartbeatTimer = null;
        const decoder = new TextDecoder();

        function sendJson(msg) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(msg));
            }
        }

        function connect() {
            let wsUrl = 'ws://' + window.location.hostname + ':3001/ws';
            
            // If we have a session ID, try to reconnect
            if (sessionId) {
                wsUrl += '?session_id=' + encodeURIComponent(sessionId);
                setStatus('Reconnecting...', 'reconnecting');
                log('reconnecting: ' + sessionId.slice(0, 8));
            } else {
                setStatus('Connecting...', '');
                log('connecting: ' + wsUrl);
            }

            ws = new WebSocket(wsUrl);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                log('ws open');
                reconnectAttempts = 0;
                
                // Start heartbeat
                if (heartbeatTimer) clearInterval(heartbeatTimer);
                heartbeatTimer = setInterval(() => {
                    sendJson({ type: 'ping' });
                }, HEARTBEAT_INTERVAL);
                
                // Send initial size
                sendJson({ type: 'resize', cols: term.cols, rows: term.rows });
            };

            ws.onmessage = (e) => {
                if (e.data instanceof ArrayBuffer) {
                    term.write(decoder.decode(e.data));
                    return;
                }
                const msg = JSON.parse(e.data);
                if (msg.type === 'connected') {
                    sessionId = msg.session_id;
                    sessionStorage.setItem(SESSION_KEY, sessionId);
                    log('stored sessionId: ' + sessionId.slice(0, 8));
                    setStatus('Connected', 'connected');
                    exportBtn.disabled = false;
                    log('session: ' + sessionId.slice(0, 8));
                } else if (msg.type === 'reconnected') {
                    sessionId = msg.session_id;
                    setStatus('Reconnected', 'connected');
                    exportBtn.disabled = false;
                    log('reconnected: ' + sessionId.slice(0, 8));
                } else if (msg.type === 'error') {
                    setStatus('Error: ' + msg.message, 'error');
                    log('error: ' + msg.message);
                    // Clear session ID if session not found/expired
                    if (msg.message.includes('not found') || msg.message.includes('expired')) {
                        sessionId = null;
                        sessionStorage.removeItem(SESSION_KEY);
                        // Try creating new session
                        setTimeout(connect, 1000);
                    }
                }
            };

            ws.onerror = () => {
                log('ws error');
            };

            ws.onclose = (e) => {
                log('disconnected: ' + e.code);
                setStatus('Disconnected', 'error');
                ws = null;
                
                // Stop heartbeat
                if (heartbeatTimer) {
                    clearInterval(heartbeatTimer);
                    heartbeatTimer = null;
                }

                // Attempt to reconnect
                if (sessionId && reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                    reconnectAttempts++;
                    log('reconnect attempt ' + reconnectAttempts + '/' + MAX_RECONNECT_ATTEMPTS);
                    setStatus('Reconnecting (' + reconnectAttempts + ')...', 'reconnecting');
                    setTimeout(connect, RECONNECT_DELAY);
                }
            };
        }

        term.onData((data) => {
            sendJson({ type: 'terminal_input', data: data });
        });

        term.onResize((size) => {
            log('term resize: ' + size.cols + 'x' + size.rows);
            sendJson({ type: 'resize', cols: size.cols, rows: size.rows });
        });

        exportBtn.onclick = () => {
            if (!sessionId) return;
            log('exporting workspace...');
            const url = 'http://' + window.location.hostname + ':3001/api/export/' + sessionId;
            const a = document.createElement('a');
            a.href = url;
            a.download = 'workspace.tar';
            a.click();
        };

        term.focus();
    })();
    </script>
</body>
</html>
