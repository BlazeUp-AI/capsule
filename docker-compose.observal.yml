# Observal stack for Capsule — single-instance, all-in-one deployment
# Start with: docker compose -f docker-compose.observal.yml up -d

services:
  observal-init:
    image: ghcr.io/blazeup-ai/observal-api:latest
    command: ["/app/entrypoint.sh"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@observal-db:5432/observal
      - CLICKHOUSE_URL=clickhouse://default:clickhouse@observal-clickhouse:8123/observal
      - REDIS_URL=redis://observal-redis:6379
      - SECRET_KEY=${OBSERVAL_SECRET_KEY:-capsule-dev-secret-change-in-prod}
      - JWT_KEY_DIR=/data/keys
      - SEED_DEMO_ACCOUNTS=true
      - DEMO_SUPER_ADMIN_EMAIL=${OBSERVAL_ADMIN_EMAIL:-admin@capsule.local}
      - DEMO_SUPER_ADMIN_PASSWORD=${OBSERVAL_ADMIN_PASSWORD:-capsule-admin-changeme}
    volumes:
      - apidata:/data
    depends_on:
      observal-db:
        condition: service_healthy
      observal-clickhouse:
        condition: service_healthy
      observal-redis:
        condition: service_healthy
    restart: "no"
    networks:
      - observal-net

  observal-api:
    image: ghcr.io/blazeup-ai/observal-api:latest
    command:
      [
        "/app/.venv/bin/python", "-m", "uvicorn",
        "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2",
      ]
    ports:
      - "127.0.0.1:8080:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@observal-db:5432/observal
      - CLICKHOUSE_URL=clickhouse://default:clickhouse@observal-clickhouse:8123/observal
      - REDIS_URL=redis://observal-redis:6379
      - SECRET_KEY=${OBSERVAL_SECRET_KEY:-capsule-dev-secret-change-in-prod}
      - JWT_KEY_DIR=/data/keys
      - SKIP_DDL_ON_STARTUP=true
      - CORS_ALLOWED_ORIGINS=*
    volumes:
      - apidata:/data
    depends_on:
      observal-init:
        condition: service_completed_successfully
      observal-redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - observal-net

  observal-db:
    image: postgres:18
    environment:
      POSTGRES_DB: observal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - observal-net

  observal-clickhouse:
    image: clickhouse/clickhouse-server:26.5
    environment:
      CLICKHOUSE_DB: observal
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
      MAX_SERVER_MEMORY_USAGE_RATIO: "0.8"
    volumes:
      - chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --password clickhouse --query 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - observal-net

  observal-redis:
    image: redis:8-alpine
    command: redis-server --maxmemory 200mb --maxmemory-policy volatile-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - observal-net

  observal-worker:
    image: ghcr.io/blazeup-ai/observal-api:latest
    command:
      [
        "/app/.venv/bin/python", "-c",
        "import asyncio; asyncio.set_event_loop(asyncio.new_event_loop()); from arq import run_worker; from worker import WorkerSettings; run_worker(WorkerSettings)",
      ]
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@observal-db:5432/observal
      - CLICKHOUSE_URL=clickhouse://default:clickhouse@observal-clickhouse:8123/observal
      - REDIS_URL=redis://observal-redis:6379
      - SECRET_KEY=${OBSERVAL_SECRET_KEY:-capsule-dev-secret-change-in-prod}
      - JWT_KEY_DIR=/data/keys
    volumes:
      - apidata:/data
    depends_on:
      observal-init:
        condition: service_completed_successfully
      observal-redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - observal-net

  observal-web:
    image: ghcr.io/blazeup-ai/observal-web:latest
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      observal-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/"]
      interval: 5s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 32M
    networks:
      - observal-net

volumes:
  pgdata:
  chdata:
  redisdata:
  apidata:

networks:
  observal-net:
    driver: bridge
